name: Python Setup & Testing
description: Setup and testing Python code with Poetry dependency manager

inputs:
  python_version:
    description: "Python version"
    required: true

runs:
  using: "composite"
  steps:
    - name: Install Python
      uses: actions/setup-python@v6
      with:
        python-version: '${{ inputs.python_version }}'
        cache: 'poetry'

    - name: Python Poetry Action
      uses: abatilo/actions-poetry@v4.0.0

    - name: Install Python dependencies
      run: poetry install
      shell: bash

    - name: Python Scripts Testing
      run: poetry run pytest -v
      shell: bash
