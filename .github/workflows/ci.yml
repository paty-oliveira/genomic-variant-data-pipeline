name: Continuous Integration Workflow

on: [push]

env:
  TF_VAR_aws_access_key: ${{ secrets.AWS_ACCESS_KEY }}
  TF_VAR_aws_secret_key: ${{ secrets.AWS_SECRET_KEY }}
  TF_VAR_aws_region: ${{ secrets.AWS_REGION }}
  TF_VAR_environment: ${{ vars.ENVIRONMENT }}

jobs:
  build-and-test-infrastructure:
    runs-on: ubuntu-latest
    environment: DEV
    env:
      TF_VAR_aws_endpoint_url: "http://127.0.0.1:4566"

    steps:
      - uses: actions/checkout@v5

      - name: Build and Start LocalStack Container
        run: |
          docker compose up -d

      - name: Verify LocalStack is Ready
        run: |
          echo "=== Docker containers ==="
          docker ps -a
          echo "=== Waiting for LocalStack ==="
          curl --retry 15 --retry-connrefused --retry-delay 2 --retry-max-time 60 -sf http://127.0.0.1:4566/_localstack/health && echo "LocalStack ready" || echo "LocalStack NOT ready"
          echo "=== LocalStack logs ==="
          docker logs localstack-main 2>&1 | tail -30

      - name: Terraform Setup and Build
        uses: ./.github/actions/terraform
        with:
          working_directory: environments/dev

      - name: Infrastructure Testing
        run: |
          find . -name "*.tftest.hcl" \
            -not -path "*/.terragrunt-cache/*" \
            -not -path "*/.terraform/*" \
            | xargs -I{} dirname {} \
            | sort -u \
            | while read dir; do
                echo "==> Running terraform test in $dir"
                terraform -chdir="$dir" init -backend=false
                terraform -chdir="$dir" test
              done

      - name: Python Setup and Testing
        uses: ./.github/actions/python
        with:
          python_version: '3.12'

      - name: Stop and Delete LocalStack Container
        if: always()
        run: docker compose down

  deploy-infrastructure:
    runs-on: ubuntu-latest
    needs: build-and-test-infrastructure
    environment: PROD

    steps:
      - uses: actions/checkout@v5

      - name: Terraform Setup and Build
        uses: ./.github/actions/terraform
        with:
          working_directory: environments/prod
          tf_api_token: ${{ secrets.TF_TOKEN }}
